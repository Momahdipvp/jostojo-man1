<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جستجوگر هوشمند | Smart Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- پس‌زمینه متحرک با ذرات -->
    <div class="particles" id="particles"></div>
    <div class="gradient-bg"></div>

    <div class="container">
        <!-- لوگو با انیمیشن -->
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-search"></i>
            </div>
            <h1 class="glitch" data-text="جستجوگر هوشمند">جستجوگر هوشمند</h1>
            <p class="typing-text" id="typingText"></p>
        </div>

        <!-- تب‌های دسته‌بندی -->
        <div class="search-tabs">
            <button class="tab-btn active" data-tab="all">
                <i class="fas fa-th"></i> همه
            </button>
            <button class="tab-btn" data-tab="images">
                <i class="fas fa-image"></i> تصاویر
            </button>
            <button class="tab-btn" data-tab="news">
                <i class="fas fa-newspaper"></i> اخبار
            </button>
            <button class="tab-btn" data-tab="videos">
                <i class="fas fa-video"></i> ویدیو
            </button>
        </div>

        <!-- باکس جستجوی شیشه‌ای -->
        <div class="search-box glass">
            <div class="search-icon">
                <i class="fas fa-search"></i>
            </div>
            <input 
                type="text" 
                id="searchInput" 
                placeholder="جستجو کنید..."
                autocomplete="off"
            >
            <button id="clearBtn" class="clear-btn">
                <i class="fas fa-times"></i>
            </button>
            <button id="searchBtn" class="search-btn">
                <span>جستجو</span>
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>

        <!-- وضعیت و آمار -->
        <div class="status" id="status"></div>

        <!-- اسکلتون لودینگ (نمایش قبل از لود نتایج) -->
        <div class="skeleton-loader" id="skeletonLoader">
            <div class="skeleton-item">
                <div class="skeleton-title"></div>
                <div class="skeleton-link"></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
            </div>
            <div class="skeleton-item">
                <div class="skeleton-title"></div>
                <div class="skeleton-link"></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
            </div>
            <div class="skeleton-item">
                <div class="skeleton-title"></div>
                <div class="skeleton-link"></div>
                <div class="skeleton-text"></div>
                <div class="skeleton-text short"></div>
            </div>
        </div>

        <!-- نتایج جستجو -->
        <div class="results" id="results"></div>

        <!-- صفحه‌بندی -->
        <div class="pagination" id="pagination">
            <button id="prevBtn" class="page-btn glass" disabled>
                <i class="fas fa-chevron-right"></i> قبلی
            </button>
            <div class="page-info" id="pageInfo">صفحه ۱</div>
            <button id="nextBtn" class="page-btn glass" disabled>
                بعدی <i class="fas fa-chevron-left"></i>
            </button>
        </div>
    </div>

    <!-- افکت نور موس -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <script src="script.js"></script>
</body>
</html>
